---
layout: default
---
<div class="legacy-entry-shell">
  <article class="legacy-entry-card post">
    <header class="legacy-entry-head post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <p class="legacy-entry-meta">{% if page.date %}{{ page.date | date: "%b %-d, %Y" }}{% endif %}{% if page.author %} • {{ page.author }}{% endif %}</p>
    </header>
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
